<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' data: https:; font-src 'self' data: https:; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{STYLE_URI}}" rel="stylesheet">
    <link href="{{EXTRA_STYLE_URI}}" rel="stylesheet">
    <title>Secrets Scanner</title>
</head>
<body>
    <div class="header">
        <div class="header-title">🔍 <span>DotEnvy</span> — Secrets Scanner</div>
        <div class="stats">
            <div class="stat stat-all active" onclick="filterBy('all')">All <span class="count-badge">{{ALL_COUNT}}</span></div>
            <div class="stat stat-high {{HIGH_ACTIVE}}" onclick="filterBy('high')">⚠️ High <span class="count-badge">{{HIGH_COUNT}}</span></div>
            <div class="stat stat-medium {{MEDIUM_ACTIVE}}" onclick="filterBy('medium')">⚡ Medium <span class="count-badge">{{MEDIUM_COUNT}}</span></div>
            <div class="stat stat-low {{LOW_ACTIVE}}" onclick="filterBy('low')">ℹ️ Low <span class="count-badge">{{LOW_COUNT}}</span></div>
        </div>
    </div>
    <div class="filter-bar">
        <input type="text" placeholder="Filter by file, type, or variable name..." oninput="filterSearch(this.value)">
    </div>
    
    {{STATS_HINT}}
    {{SECRETS_CONTENT}}

    <script type="application/json" id="secrets-data">
        {{JSON_SECRETS}}
    </script>
    <script nonce="{{NONCE}}">
        const vscode = acquireVsCodeApi();
        const secrets = JSON.parse(document.getElementById('secrets-data').textContent || '[]');
        let f = 'all', q = '';

        function viewLocation(i) { vscode.postMessage({ type: 'viewLocation', secret: secrets[i] }); }
        function moveToEnv(i) { vscode.postMessage({ type: 'moveToEnv', secret: secrets[i] }); }
        function ignore(i) { vscode.postMessage({ type: 'ignore', secret: secrets[i] }); }

        function filterBy(l) {
            f = l;
            applyFilters();
            document.querySelectorAll('.stat').forEach(e => {
                const isMatch = e.getAttribute('onclick').includes("'" + l + "'");
                e.classList.toggle('active', isMatch);
                e.classList.toggle('inactive', !isMatch);
            });
        }

        function filterSearch(v) {
            q = v.toLowerCase();
            applyFilters();
        }

        function applyFilters() {
            document.querySelectorAll('.secret-row').forEach(row => {
                const c = row.getAttribute('data-confidence');
                const i = parseInt(row.getAttribute('data-index'), 10);
                const s = secrets[i];
                const text = (s.file + s.type + s.suggestedEnvVar + s.content).toLowerCase();
                const matchConf = (f === 'all' || c === f);
                const matchSearch = (!q || text.includes(q));
                row.style.display = (matchConf && matchSearch) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
